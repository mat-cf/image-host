services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: imagehost
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: "postgres://postgres:postgres@postgres:5432/imagehost?sslmode=disable"
      STORAGE_PATH: "./uploads"
      BASE_URL: "http://localhost:8080"
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      - postgres

volumes:
  postgres_data: